# Agent Status Companion — 电脑端配置
# 编辑此文件后重启 push_to_esp32.py 即可生效

udp:
  broadcast: "192.168.0.255"
  port: 8888

monitor:
  poll_interval: 1          # 轮询间隔(秒)
  working_timeout: 8        # 最近 N 秒有 API call 判定为 working
  max_context: 1000000      # 最大上下文(用于百分比)

display:
  oled_line1: "{model}"               # 支持: {model} {status} {ctx_pct} {ctx_k}
  oled_line2: "Ctx: {ctx_pct}"        # 支持: {model} {status} {ctx_pct} {ctx_k}
  lcd_line1: "{kaomoji} {status_short}" # 支持: {kaomoji} {status} {status_short}
  lcd_line2: "{ctx_k}/1M"             # 支持: {ctx_k} {ctx_pct} {status}

# 颜文字 — 来自 Hermes TUI 内置 (KAWAII_WAITING / KAWAII_THINKING)
# 每状态多选一，取消注释即可切换
kaomoji:
  idle: "(^_^)"              # Hermes CLI 默认
  # idle: "(^-^)"            # 旧版简洁
  # idle: "( ˘▽˘)っ"        # 悠闲

  working: "(◔_◔)"           # Hermes thinking 第一帧
  # working: "(>_<)"         # 旧版
  # working: "◉_◉"           # 震惊
  # working: "ಠ_ಠ"           # 认真
  # working: "(⊙_⊙)"         # 凝视

  waiting: "(◕‿◕✿)"          # Hermes waiting
  # waiting: "(o_o)"         # 旧版
  # waiting: "(｡◕‿◕｡)"      # 软萌
  # waiting: "(✿◠‿◠)"        # 花痴
  # waiting: "(◕ᴗ◕✿)"       # 甜甜

  error: "(x_x)"             # Hermes CLI — 致命错误
  # error: "(>_<)"           # 旧版
  # error: "(｡•́︿•̀｡)"      # 伤心

  unknown: "(?_?)"

# 状态简称
status_short:
  idle: "Zzz"
  working: "Busy"
  waiting: "Wait"
  error: "Err!"
  unknown: "???"
