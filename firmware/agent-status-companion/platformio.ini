; PlatformIO 项目配置 — Agent Status Companion

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
board_build.src_dir = src
upload_port = COM3
monitor_port = COM3
monitor_speed = 115200
monitor_filters = direct

lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.0
    adafruit/Adafruit NeoPixel @ ^1.12
    adafruit/Adafruit SSD1306 @ ^2.5
    adafruit/Adafruit GFX Library @ ^1.11
    arduino-libraries/LiquidCrystal @ ^1.0.7

build_flags =

; === 常用命令 ===
; 编译:              pio run
; 烧录:              pio run -t upload
; 烧录 + 监视:       pio run -t upload -t monitor
; 仅监视:            pio device monitor
; 清理:              pio run -t clean
