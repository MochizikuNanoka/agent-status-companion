; PlatformIO 项目配置 — agent-status-companion
; 硬件: ESP32 Dev Kit v1 + SSD1306 OLED + WS2812B LED
;
; 使用说明:
;   1. 安装 PlatformIO (VS Code 扩展 或 CLI)
;   2. 在此目录下打开终端: pio run
;   3. 上传: pio run --target upload
;   4. 串口监视: pio device monitor
;
; Wokwi 模拟:
;   在 VS Code 中安装 Wokwi 扩展,
;   按 F1 → "Wokwi: Start Simulator"

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.flash_mode = dio

lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.0
    adafruit/Adafruit NeoPixel @ ^1.12
    adafruit/Adafruit SSD1306 @ ^2.5
    adafruit/Adafruit GFX Library @ ^1.11

; 调试构建 (启用串口详细输出)
[env:esp32dev-debug]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.flash_mode = dio
build_flags =
    -DDEBUG
lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.0
    adafruit/Adafruit NeoPixel @ ^1.12
    adafruit/Adafruit SSD1306 @ ^2.5
    adafruit/Adafruit GFX Library @ ^1.11
