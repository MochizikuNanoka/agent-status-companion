; PlatformIO 项目配置 — Agent Status Companion
; 支持真实硬件 (ESP32 DevKit) + Wokwi 模拟器

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_filters = direct
board_build.src_dir = src
; 烧录端口（根据实际 COM 口修改，如 COM3, COM10 等）
; upload_port = COM3
; monitor_port = COM3

lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.0
    adafruit/Adafruit NeoPixel @ ^1.12
    adafruit/Adafruit SSD1306 @ ^2.5
    adafruit/Adafruit GFX Library @ ^1.11

; === 真实硬件编译 (默认) ===
;   引脚: RGB_LED=GPIO4, OLED_SDA=21, OLED_SCL=22
build_flags =

; === Wokwi 模拟器编译 ===
;   编译时定义 WOKWI 宏，自动切换引脚: RGB_LED=GPIO16
;   使用: pio run -e esp32dev-wokwi
[env:esp32dev-wokwi]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.src_dir = src
build_flags =
    -DWOKWI
lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.0
    adafruit/Adafruit NeoPixel @ ^1.12
    adafruit/Adafruit SSD1306 @ ^2.5
    adafruit/Adafruit GFX Library @ ^1.11

; === 常用命令 ===
; 编译:              pio run
; 烧录 + 监视:       pio run -t upload -t monitor
; 仅监视:            pio device monitor
; Wokwi 编译:        pio run -e esp32dev-wokwi
; 清理:              pio run -t clean
